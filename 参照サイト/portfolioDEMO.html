<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>NFC Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="./img/nameCard/アセット 1.svg"/>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --ink: #1a1a18; /* 完全黒をやめる */
        --paper: #f7f6f2; /* 少し明るく */
        --paper2: #f0ece4;

        --accent: #d4b87a;
        --accent-soft: #e7d3a3;

        --air: rgba(255, 255, 255, 0.06);
        --dim: rgba(20, 20, 18, 0.35);
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      /* ─── NFC SPLASH ─── */
      #nfc-splash {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: #050503;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: opacity 0.8s ease;
      }
      #nfc-splash.out {
        opacity: 0;
        pointer-events: none;
      }

      .ripple-ring {
        position: absolute;
        width: 140px;
        height: 140px;
        top: 45%;
        left: 52%;
        border-radius: 50%;
        border: 1px solid rgba(200, 169, 110, 0.3);
        animation: ripple 3s ease-out infinite;
      }
      .ripple-ring:nth-child(2) {
        animation-delay: 1s;
      }
      .ripple-ring:nth-child(3) {
        animation-delay: 2s;
      }
      @keyframes ripple {
        0% {
          transform: scale(1);
          opacity: 0.8;
        }
        100% {
          transform: scale(4);
          opacity: 0;
        }
      }

      .card-float {
        position: relative;
        z-index: 2;
        width: 344px;
        height: 208px;
        object-fit: cover;

        display: block;
        animation: cardFloat 4s ease-in-out infinite;
        box-shadow:
          0 0 40px rgba(212, 184, 122, 0.06),
          0 10px 30px rgba(0, 0, 0, 0.5);
      }

      @keyframes cardFloat {
        0%,
        100% {
          transform: translateY(0) rotateX(5deg) rotateY(-3deg);
        }
        50% {
          transform: translateY(-12px) rotateX(3deg) rotateY(3deg);
        }
      }
      .card-name {
        font-family: var(--serif);
        font-size: 18px;
        font-weight: 300;
        color: #e8e4dc;
        letter-spacing: 0.05em;
      }
      .card-title {
        font-family: var(--mono);
        font-size: 9px;
        color: rgba(200, 169, 110, 0.7);
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .card-nfc-icon {
        position: absolute;
        bottom: 18px;
        right: 22px;
        width: 24px;
        height: 24px;
        opacity: 0.5;
      }
      .card-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.6;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      .splash-hint {
        position: absolute;
        bottom: 48px;
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.25em;
        color: rgba(200, 169, 110, 0.5);
        text-transform: uppercase;
        animation: blink 2s ease-in-out infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }

      /* ─── LOADING ─── */
      #loading {
        position: fixed;
        inset: 0;
        z-index: 90;
        background: #050503;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s;
      }
      #loading.visible {
        opacity: 1;
      }
      #loading.out {
        opacity: 0;
      }
      .loading-bar-wrap {
        width: 200px;
      }
      .loading-label {
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 0.3em;
        color: rgba(200, 169, 110, 0.5);
        text-transform: uppercase;
        margin-bottom: 12px;
        text-align: center;
      }
      .loading-bar {
        height: 1px;
        background: rgba(200, 169, 110, 0.15);
        overflow: hidden;
      }
      .loading-fill {
        height: 100%;
        width: 0%;
        background: var(--accent);
        transition: width 0.05s linear;
      }

      /* ─── MAIN 3D CANVAS ─── */
      #canvas-container {
        position: fixed;
        inset: 0;
        z-index: 1;
        opacity: 0;
        transition: opacity 1.2s ease;
      }
      #canvas-container.visible {
        opacity: 1;
      }

      /* ─── HUD OVERLAYS ─── */
      #top-hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        padding: 28px 32px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        opacity: 0;
        transition: opacity 1s ease 0.5s;
      }
      #top-hud.visible {
        opacity: 1;
      }
      .hud-name {
        font-family: var(--serif);
        font-size: 24px;
        font-weight: 300;
        color: var(--paper);
        letter-spacing: 0.05em;
      }
      .hud-sub {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--accent);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-top: 4px;
      }
      .hud-scroll-hint {
        font-family: var(--mono);
        font-size: 9px;
        color: rgba(244, 242, 237, 0.3);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-align: right;
        padding-top: 4px;
      }

      /* ─── DOTS NAV ─── */
      #dots-nav {
        position: fixed;
        bottom: 36px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        gap: 10px;
        opacity: 0;
        transition: opacity 1s ease 0.8s;
        pointer-events: none;
      }
      #dots-nav.visible {
        opacity: 1;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(244, 242, 237, 0.25);
        transition: all 0.3s ease;
        cursor: pointer;
      }
      .dot.active {
        background: var(--accent);
        width: 24px;
        border-radius: 3px;
      }
      #panel-wraper {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none; /* 重要：3D操作を邪魔しない */
      }

      /* ─── PANEL LABEL — デスクトップ (左下) ─── */
      #panel-label {
        position: fixed;
        bottom: 72px;
        left: 32px;
        z-index: 10;
        opacity: 0;
        transition: opacity 0.4s ease;
        /* モバイルでは非表示にして #panel-label-side に切り替え */
      }
      #panel-label.visible {
        opacity: 1;
      }
      .panel-num {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--accent);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .panel-title {
        font-family: var(--serif);
        font-size: 28px;
        font-weight: 300;
        color: var(--paper);
        letter-spacing: 0.04em;
      }

      .panel-desc {
        font-family: var(--serif);
        font-size: 13px;
        line-height: 1.6;
        color: rgba(244, 242, 237, 0.55);
        margin-top: 10px;
        max-width: 260px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ─── PANEL LABEL — モバイル横並び ─── */
      #panel-label-side {
        position: fixed;
        /* ギャラリーの左端に配置。垂直中央 */
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        opacity: 0;
        transition: opacity 0.4s ease;
        display: none; /* JS で表示切り替え */
        pointer-events: none;
      }
      #panel-label-side.visible {
        opacity: 1;
      }

      /* 半透明背景ラッパー */
      .panel-label-bg {
        background: rgba(255, 255, 255, 0.04);
        border-right: 0.5px solid rgba(212, 184, 122, 0.2);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);

        padding: 18px 16px 18px 14px;
        border-radius: 0 6px 6px 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 80px;
      }
      .panel-label-bg .panel-num {
        font-family: var(--mono);
        font-size: 8px;
        color: var(--accent);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 0;
        white-space: nowrap;
      }
      .panel-label-bg .panel-title {
        font-family: var(--serif);
        font-size: 20px;
        font-weight: 300;
        color: var(--paper);
        letter-spacing: 0.04em;
        line-height: 1.15;
        /* 縦書き風に改行させる */
        word-break: break-all;
        max-width: 52px;
      }
      /* アクセントライン */
      .panel-label-bg::before {
        content: "";
        display: block;
        width: 18px;
        height: 0.5px;
        background: var(--accent);
        margin-bottom: 4px;
        opacity: 0.6;
      }

      /* ─── DETAIL OVERLAY ─── */
      #overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        background: rgba(5, 5, 3, 0.92);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #overlay.visible {
        opacity: 1;
        pointer-events: all;
      }

      .overlay-inner {
        width: min(520px, 90vw);
        background: #0e0e09;
        border: 0.5px solid rgba(200, 169, 110, 0.25);
        border-radius: 2px;
        padding: 48px;
        position: relative;
        animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        max-height: 88vh;
        overflow-y: auto;
      }
      @keyframes slideUp {
        from {
          transform: translateY(32px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .overlay-close {
        position: absolute;
        top: 20px;
        right: 24px;
        font-family: var(--mono);
        font-size: 10px;
        color: rgba(200, 169, 110, 0.5);
        letter-spacing: 0.2em;
        cursor: pointer;
        text-transform: uppercase;
        transition: color 0.2s;
      }
      .overlay-close:hover {
        color: var(--accent);
      }
      .overlay-tag {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--accent);
        letter-spacing: 0.25em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      .overlay-title {
        font-family: var(--serif);
        font-size: 36px;
        font-weight: 300;
        color: var(--paper);
        line-height: 1.1;
        margin-bottom: 12px;
        letter-spacing: 0.03em;
      }
      .overlay-desc {
        font-family: var(--serif);
        font-size: 15px;
        font-weight: 300;
        color: rgba(244, 242, 237, 0.6);
        line-height: 1.75;
        margin-bottom: 32px;
      }
      .overlay-meta {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 32px;
      }
      .meta-chip {
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 0.15em;
        color: rgba(200, 169, 110, 0.7);
        text-transform: uppercase;
        border: 0.5px solid rgba(200, 169, 110, 0.2);
        border-radius: 1px;
        padding: 6px 12px;
      }
      .overlay-cta-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .btn-primary {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        background: var(--accent);
        color: #050503;
        border: none;
        cursor: pointer;
        padding: 14px 28px;
        border-radius: 1px;
        text-decoration: none;
        transition: opacity 0.2s;
      }
      .btn-primary:hover {
        opacity: 0.85;
      }
      .btn-ghost {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        background: transparent;
        color: rgba(244, 242, 237, 0.5);
        border: 0.5px solid rgba(244, 242, 237, 0.15);
        cursor: pointer;
        padding: 14px 28px;
        border-radius: 1px;
        text-decoration: none;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .btn-ghost:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .contact-grid {
        display: grid;
        gap: 16px;
      }
      .contact-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        border-bottom: 0.5px solid rgba(200, 169, 110, 0.1);
        padding-bottom: 16px;
      }
      .contact-label {
        font-family: var(--mono);
        font-size: 9px;
        color: rgba(200, 169, 110, 0.5);
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }
      .contact-value {
        font-family: var(--serif);
        font-size: 15px;
        color: var(--paper);
      }
      .contact-value a {
        color: var(--accent);
        text-decoration: none;
      }

      /* ─── SCAN FLASH ─── */
      #scan-flash {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: var(--accent);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.1s;
      }

      /* ─── MOBILE OVERRIDES ─── */
      @media (max-width: 768px) {
        #top-hud {
          padding: 20px 20px;
        }
        .hud-name {
          font-size: 17px;
        }
        .hud-scroll-hint {
          font-size: 8px;
        }

        /* デスクトップ用ラベルを非表示、モバイル用を表示 */
        #panel-label {
          display: none !important;
        }
        #panel-label-side {
          display: block;
        }

        /* ドットナビをもう少し上に */
        #dots-nav {
          bottom: 28px;
        }

        .overlay-inner {
          padding: 32px 24px;
        }
        .overlay-title {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div id="scan-flash"></div>

    <!-- NFC Splash -->
    <div id="nfc-splash">
      <div class="ripple-ring"></div>
      <div class="ripple-ring"></div>
      <div class="ripple-ring"></div>
      <img
        class="card-float"
        src="img/nameCard/アセット 1.svg"
        alt="NFC business card"
      />
      <div class="splash-hint">タップして解錠</div>
    </div>

    <!-- Loading -->
    <div id="loading">
      <div class="loading-bar-wrap">
        <div class="loading-label">loading portfolio</div>
        <div class="loading-bar">
          <div class="loading-fill" id="loading-fill"></div>
        </div>
      </div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- HUD -->
    <div id="top-hud">
      <div>
        <div class="hud-name">Okamoto takaaki</div>
        <div class="hud-sub">情報デザイン学科 &amp; プログラミング研究会</div>
      </div>
      <div class="hud-scroll-hint">スクロールで<br />ギャラリーを探索</div>
    </div>

    <div id="panel-wraper">
      <!-- Panel label — デスクトップ：左下-->
    <div id="panel-label">
      <div class="panel-num" id="panel-num">01 / 04</div>
      <div class="panel-title" id="panel-title">demo01</div>
      <div class="panel-desc" id="panel-desc"></div>
    </div>

    <!-- Panel label — モバイル：ギャラリー横 -->
    <div id="panel-label-side">
      <div class="panel-label-bg">
        <div class="panel-num" id="panel-num-side">01 / 04</div>
        <div class="panel-title" id="panel-title-side">demo01</div>
        <div class="panel-desc" id="panel-desc-side"></div>
      </div>
    </div>
</div>
    <!-- Dots nav -->
    <div id="dots-nav">
      <div class="dot active" id="slide-0" onclick="goToSlide(0)"></div>
      <div class="dot" id="slide-1" onclick="goToSlide(1)"></div>
      <div class="dot" id="slide-2" onclick="goToSlide(2)"></div>
      <div class="dot" id="slide-3" onclick="goToSlide(3)"></div>
    </div>

    <!-- Detail Overlay -->
    <div id="overlay">
      <div class="overlay-inner" id="overlay-inner">
        <div class="overlay-close" onclick="closeOverlay()">× 閉じる</div>
        <div class="overlay-tag" id="ov-tag">Project 01</div>
        <div class="overlay-title" id="ov-title">demo</div>
        <div class="overlay-desc" id="ov-desc">
          高山地帯の光と影を捉えた写真シリーズ。
        </div>
        <div class="overlay-meta" id="ov-meta"></div>
        <div class="overlay-cta-row" id="ov-cta"></div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      const PANELS = [
        {
          title: "プロジェクト1",
          titleEn: "Project01",
          tag: "Project 01 — Photography",
          desc: "高山地帯の光と影を捉えた写真シリーズ。詳細はオーバーレイで表示されます。",
          short: "short test",
          chips: ["demo", "demo", "2024"],
          cta: [
            { label: "作品を見る", href: "#", primary: true },
            // { label: "連絡する", href: "#contact", primary: false },
          ],
          img: "https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=1200&q=85",
        },
        {
          title: "プロジェクト1",
          titleEn: "Project01",
          tag: "Project 01 — Photography",
          desc: "長文（overlay用）",
          short: "short test",
          chips: ["demo", "demo", "2024"],
          cta: [
            { label: "作品を見る", href: "#", primary: true },
            { label: "連絡する", href: "#contact", primary: false },
          ],
          img: "https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=1200&q=85",
        },
        {
          title: "プロジェクト1",
          titleEn: "Project01",
          tag: "Project 01 — Photography",
          desc: "温かみのあるブラシストロークを用いた実験的表現。",
          short: "short test",
          chips: ["demo", "demo", "2024"],
          cta: [
            { label: "作品を見る", href: "#", primary: true },
            { label: "連絡する", href: "#contact", primary: false },
          ],
          img: "https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=1200&q=85",
        },
        {
          title: "プロジェクト1",
          titleEn: "Project01",
          tag: "Project 01 — Photography",
          desc: "都市風景を通じて時間の流れを写真で表現したシリーズ。",
          short: "short test",
          chips: ["demo", "demo", "2024"],
          cta: [
            { label: "作品を見る", href: "#", primary: true },
            { label: "連絡する", href: "#contact", primary: false },
          ],
          img: "https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=1200&q=85",
        },
      ];

      const isMobile = () => window.innerWidth <= 768;

      // ── NFC SPLASH ──
      const splash = document.getElementById("nfc-splash");
      const loading = document.getElementById("loading");
      const fill = document.getElementById("loading-fill");
      const canvasContainer = document.getElementById("canvas-container");
      const topHud = document.getElementById("top-hud");
      const dotsNav = document.getElementById("dots-nav");
      const panelLabel = document.getElementById("panel-label");
      const panelLabelSide = document.getElementById("panel-label-side");
      const flashEl = document.getElementById("scan-flash");

      function flashAnim(cb) {
        flashEl.style.opacity = "1";
        setTimeout(() => {
          flashEl.style.opacity = "0";
          setTimeout(cb, 300);
        }, 120);
      }

      splash.addEventListener("click", () => {
        flashAnim(() => {
          splash.classList.add("out");
          loading.classList.add("visible");
          let p = 0;
          const iv = setInterval(() => {
            p += 1.5 + Math.random() * 2;
            fill.style.width = Math.min(p, 100) + "%";
            if (p >= 100) {
              clearInterval(iv);
              setTimeout(() => {
                loading.classList.remove("visible");
                loading.classList.add("out");
                canvasContainer.classList.add("visible");
                topHud.classList.add("visible");
                dotsNav.classList.add("visible");
                setTimeout(() => {
                  if (isMobile()) {
                    panelLabelSide.classList.add("visible");
                  } else {
                    panelLabel.classList.add("visible");
                  }
                }, 800);
              }, 400);
            }
          }, 40);
        });
      });

      // ── THREE.JS CONFIG (モバイル対応) ──
      function getConfig() {
        const mobile = isMobile();
        return {
          slideCount: 4,
          spacingX: mobile ? 32 : 46,
          pWidth: mobile ? 6 : 19,
          pHeight: mobile ? 3.6 : 11.5,
          camZ: mobile ? 20 : 28,
          // モバイルはほぼ正面向き、デスクトップは斜め
          wallAngleY: mobile ? -0.06 : -0.22,
          snapDelay: 180,
          lerpSpeed: 0.065,
        };
      }

      let CONFIG = getConfig();
      let totalGalleryWidth = CONFIG.slideCount * CONFIG.spacingX;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f0f0c);
      scene.fog = new THREE.Fog(0x0f0f0c, 40, 160);

      const camera = new THREE.PerspectiveCamera(
        44,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(0, 0, CONFIG.camZ);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      canvasContainer.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 0.55));
      const dir1 = new THREE.DirectionalLight(0xfff2d6, 0.9);
      dir1.position.set(8, 16, 12);
      scene.add(dir1);
      const dir2 = new THREE.DirectionalLight(0x9fb4ff, 0.25);
      dir2.position.set(-12, -8, 8);
      scene.add(dir2);

      const galleryGroup = new THREE.Group();
      scene.add(galleryGroup);

      const textureLoader = new THREE.TextureLoader();
      const paintingGroups = [];
      const raycaster = new THREE.Raycaster();
      const clickMeshes = [];

      function buildGallery() {
        // Clear existing
        while (galleryGroup.children.length)
          galleryGroup.remove(galleryGroup.children[0]);
        paintingGroups.length = 0;
        clickMeshes.length = 0;

        for (let i = 0; i < CONFIG.slideCount; i++) {
          const group = new THREE.Group();
          group.position.set(i * CONFIG.spacingX, 0, 0);

          const framePadding = isMobile() ? 0.35 : 0.7;
          const frameW = CONFIG.pWidth + framePadding;
          const frameH = CONFIG.pHeight + framePadding;
          const frameMat = new THREE.MeshStandardMaterial({
            color: 0x2a241d, // ← 少し明るく
            roughness: 0.7,
            metalness: 0.15,
          });
          const frameMesh = new THREE.Mesh(
            new THREE.BoxGeometry(frameW, frameH, 0.25),
            frameMat,
          );
          frameMesh.position.z = -0.14;

          const borderMat = new THREE.MeshStandardMaterial({
            color: 0xd4b87a,
            metalness: 0.7,
            roughness: 0.25,
          });
          const borderMesh = new THREE.Mesh(
            new THREE.BoxGeometry(frameW + 0.1, frameH + 0.1, 0.05),
            borderMat,
          );
          borderMesh.position.z = -0.27;

          const imgMat = new THREE.MeshBasicMaterial({
            map: textureLoader.load(PANELS[i].img),
          });
          const imgMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(CONFIG.pWidth, CONFIG.pHeight),
            imgMat,
          );
          imgMesh.userData.panelIndex = i;
          clickMeshes.push(imgMesh);

          const shadowMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(frameW, frameH * 0.4),
            new THREE.MeshBasicMaterial({
              color: 0x000000,
              transparent: true,
              opacity: 0.35,
            }),
          );

          const wallGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-CONFIG.spacingX / 2, 16, -2),
            new THREE.Vector3(CONFIG.spacingX / 2, 16, -2),
            new THREE.Vector3(-CONFIG.spacingX / 2, -16, -2),
            new THREE.Vector3(CONFIG.spacingX / 2, -16, -2),
          ]);
          const wallLines = new THREE.LineSegments(
            wallGeo,
            new THREE.LineBasicMaterial({ color: 0x1a1a14 }),
          );

          group.add(wallLines);
          /*group.add(shadowMesh);*/
          group.add(borderMesh);
          group.add(frameMesh);
          group.add(imgMesh);
          galleryGroup.add(group);
          paintingGroups.push(group);
        }

        galleryGroup.rotation.y = CONFIG.wallAngleY;
        // モバイルではギャラリーを右寄りに（ラベル分のスペースを確保）
        galleryGroup.position.x = isMobile() ? 2 : 7;
      }

      buildGallery();

      // ── Scroll / touch ──
      let currentScroll = 0,
        targetScroll = 0;
      let snapTimer = null;
      let mouse = { x: 0, y: 0 };
      let currentIndex = 0;

      const panelTitles = [
        "Demo01",
        "demo02",
        "demo03",
        "demo04",
      ];
      const panelNums = ["01 / 04", "02 / 04", "03 / 04", "04 / 04"];

      function goToSlide(i) {
        targetScroll = i * CONFIG.spacingX;
      }

      function snapToNearest() {
        const idx = Math.round(targetScroll / CONFIG.spacingX);
        targetScroll = idx * CONFIG.spacingX;
      }

      function onWheel(e) {
        targetScroll += e.deltaY * 0.1;
        if (snapTimer) clearTimeout(snapTimer);
        snapTimer = setTimeout(snapToNearest, CONFIG.snapDelay);
      }
      window.addEventListener("wheel", onWheel, { passive: true });

      let touchStart = 0;
      function onTouchStart(e) {
        touchStart = e.touches[0].clientX;
        if (snapTimer) clearTimeout(snapTimer);
      }
      function onTouchMove(e) {
        const diff = touchStart - e.touches[0].clientX;
        targetScroll += diff * 0.55;
        touchStart = e.touches[0].clientX;
        if (snapTimer) clearTimeout(snapTimer);
      }
      function onTouchEnd() {
        snapToNearest();
      }
      window.addEventListener("touchstart", onTouchStart, { passive: true });
      window.addEventListener("touchmove", onTouchMove, { passive: true });
      window.addEventListener("touchend", onTouchEnd, { passive: true });

      function onMouseMove(e) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      }
      window.addEventListener("mousemove", onMouseMove);

      // Click to open overlay
      function onRendererClick(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        const ndcX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        const ndcY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera({ x: ndcX, y: ndcY }, camera);
        const hits = raycaster.intersectObjects(clickMeshes);
        if (hits.length > 0) openOverlay(hits[0].object.userData.panelIndex);
      }
      renderer.domElement.addEventListener("click", onRendererClick);

      // ── Overlay ──
      function openOverlay(i) {
        const p = PANELS[i];
        const ov = document.getElementById("overlay");
        document.getElementById("ov-tag").textContent = p.tag;
        document.getElementById("ov-title").textContent = p.title;
        document.getElementById("ov-desc").textContent = p.isContact
          ? ""
          : p.desc;

        const metaEl = document.getElementById("ov-meta");
        metaEl.innerHTML = "";
        if (p.chips)
          p.chips.forEach((c) => {
            const chip = document.createElement("div");
            chip.className = "meta-chip";
            chip.textContent = c;
            metaEl.appendChild(chip);
          });

        const ctaEl = document.getElementById("ov-cta");
        ctaEl.innerHTML = "";
        if (p.isContact) {
          document.getElementById("ov-desc").innerHTML = "";
          ctaEl.innerHTML = `<div class="contact-grid" style="width:100%">
            <div class="contact-row"><span class="contact-label">Email</span><span class="contact-value"><a href="mailto:kenji@example.com">kenji@example.com</a></span></div>
            <div class="contact-row"><span class="contact-label">Web</span><span class="contact-value"><a href="#" style="color:var(--accent)">kenji.design</a></span></div>
            <div class="contact-row"><span class="contact-label">Location</span><span class="contact-value">岐阜, Japan</span></div>
            <div class="contact-row" style="border-bottom:none"><span class="contact-label">SNS</span><span class="contact-value"><a href="#" style="color:var(--accent)">@kenjiyamada</a></span></div>
          </div>`;
        } else {
          if (p.cta)
            p.cta.forEach((btn) => {
              const a = document.createElement("a");
              a.href = btn.href;
              a.textContent = btn.label;
              a.className = btn.primary ? "btn-primary" : "btn-ghost";
              ctaEl.appendChild(a);
            });
        }
        ov.classList.add("visible");
      }

      function closeOverlay() {
        document.getElementById("overlay").classList.remove("visible");
      }
      document.getElementById("overlay").addEventListener("click", (e) => {
        if (e.target === document.getElementById("overlay")) closeOverlay();
      });

      // ── Update UI ──
      function updateUI(scrollX) {
        const raw = Math.round(scrollX / CONFIG.spacingX);
        const safe =
          ((raw % CONFIG.slideCount) + CONFIG.slideCount) % CONFIG.slideCount;
        for (let i = 0; i < CONFIG.slideCount; i++) {
          const el = document.getElementById(`slide-${i}`);
          if (el) el.classList.toggle("active", i === safe);
        }
        if (safe !== currentIndex) {
          currentIndex = safe;
          // デスクトップ用
          document.getElementById("panel-num").textContent = panelNums[safe];
          document.getElementById("panel-title").textContent =
            panelTitles[safe];
          // パネル用の短い説明を常時表示領域にセット（overlayは長文descを使用）
          const shortText = PANELS[safe] && PANELS[safe].short ? PANELS[safe].short : (PANELS[safe] && PANELS[safe].desc ? PANELS[safe].desc : "");
          const pd = document.getElementById("panel-desc");
          if (pd) pd.textContent = shortText;
          panelLabel.classList.remove("visible");
          // モバイル用
          document.getElementById("panel-num-side").textContent =
            panelNums[safe];
          document.getElementById("panel-title-side").textContent =
            panelTitles[safe];
          const pdSide = document.getElementById("panel-desc-side");
          if (pdSide) pdSide.textContent = shortText;
          panelLabelSide.classList.remove("visible");

          setTimeout(() => {
            if (isMobile()) panelLabelSide.classList.add("visible");
            else panelLabel.classList.add("visible");
          }, 80);
        }
      }

      // ── Animate ──
      function animate() {
        requestAnimationFrame(animate);
        currentScroll += (targetScroll - currentScroll) * CONFIG.lerpSpeed;

        const xMove = currentScroll * Math.cos(CONFIG.wallAngleY);
        const zMove = currentScroll * Math.sin(CONFIG.wallAngleY);
        camera.position.x = xMove;
        camera.position.z = CONFIG.camZ - zMove;

        paintingGroups.forEach((group, i) => {
          const origX = i * CONFIG.spacingX;
          const dist = currentScroll - origX;
          const shift =
            Math.round(dist / totalGalleryWidth) * totalGalleryWidth;
          group.position.x = origX + shift;
        });

        // モバイルではマウス傾きを抑制
        const tiltFactor = isMobile() ? 0.015 : 0.04;
        camera.rotation.x = mouse.y * tiltFactor;
        camera.rotation.y = -mouse.x * tiltFactor + CONFIG.wallAngleY * 0.1;

        updateUI(currentScroll);
        renderer.render(scene, camera);
      }

      function onResize() {
        const wasM = isMobile();
        CONFIG = getConfig();
        totalGalleryWidth = CONFIG.slideCount * CONFIG.spacingX;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = CONFIG.camZ;
        galleryGroup.rotation.y = CONFIG.wallAngleY;
        galleryGroup.position.x = isMobile() ? 2 : 7;
        buildGallery();

        // リサイズ後にラベル表示切り替え
        if (isMobile()) {
          panelLabel.classList.remove("visible");
          panelLabelSide.classList.add("visible");
        } else {
          panelLabelSide.classList.remove("visible");
          panelLabel.classList.add("visible");
        }
      }
      window.addEventListener("resize", onResize);

      animate();
    </script>
  </body>
</html>
